# 定義一個函數來處理每年的資料
process_year_data <- function(year) {
  # 建立一個空的資料框來存放所有季度的資料
  year_data <- data.frame()
  
  # 設定檔案路徑的前半部分
  filepath_base <- paste0("C:/Users/User/Desktop/地政大事記/資料清理/實價登錄原始檔案/", year, "/")
  
  # 使用 for 迴圈讀取每個季度的檔案
  for (quarter in c("Q1", "Q2", "Q3", "Q4")) {
    # 組合完整的檔案路徑
    filepath <- paste0(filepath_base, quarter)
    
    # 列出所有以 land_A.csv 結尾的檔案
    land_a_files <- list.files(path = filepath, pattern = "land_A.csv", full.names = TRUE)
    
    # 初始化一個空的資料框來存放合併後的資料
    all_data <- data.frame()
    
    # 逐一讀取檔案並合併
    for (file in land_a_files) {
      # 讀取 CSV 檔案
      data <- read_csv(file)
      # 添加來源檔案名稱作為新欄位
      data$來源檔案 <- basename(file)
      # 合併到總資料框
      all_data <- bind_rows(all_data, data)
    }
    
    # 將該季度的資料添加到年度資料框
    year_data <- bind_rows(year_data, all_data)
  }
  
  # 回傳該年度的資料
  return(year_data)
}

