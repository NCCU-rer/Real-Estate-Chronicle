convert_floor_to_number <- function(floor_text) {
  floor_dict <- c("一層", "二層", "三層", "四層", "五層", "六層", "七層", "八層", "九層", "十層",
                  "十一層", "十二層", "十三層", "十四層", "十五層", "十六層", "十七層", "十八層", "十九層", "二十層",
                  "二十一層", "二十二層", "二十三層", "二十四層", "二十五層", "二十六層", "二十七層", "二十八層", "二十九層", "三十層",
                  "三十一層", "三十二層", "三十三層", "三十四層", "三十五層", "三十六層", "三十七層", "三十八層", "三十九層", "四十層",
                  "四十一層", "四十二層", "四十三層", "四十四層", "四十五層", "四十六層", "四十七層", "四十八層", "四十九層", "五十層",
                  "五十一層", "五十二層", "五十三層", "五十四層", "五十五層", "五十六層", "五十七層")
  
  index <- match(floor_text, floor_dict)
  
  if (!is.na(index)) {
    return(index)
  } else {
    return(NA)
  }
}

