# 計算全國的數據（只計算中位數單價）
calculate_national <- function(data) {
  data %>%
    group_by(年度, 季度) %>%
    summarize(
      中位數單價 = round(median(HP, na.rm = TRUE), 0),  # 四捨五入
      .groups = 'drop'
    ) %>%
    mutate(縣市 = "全國")  # 新增一列表示全國
}

# 計算縣市或七都的數據（只計算中位數單價）
calculate_city <- function(data, cities = NULL) {
  if (!is.null(cities)) {
    data <- data %>% filter(縣市 %in% cities)
  }
  data %>%
    group_by(縣市, 年度, 季度) %>%
    summarize(
      中位數單價 = round(median(HP, na.rm = TRUE), 0),  # 四捨五入
      .groups = 'drop'
    )
}

# 合併全國和縣市/七都的數據
combine_national_city <- function(data, cities = NULL) {
  national <- calculate_national(data)
  city <- calculate_city(data, cities)
  bind_rows(national, city)
}

# 篩選條件的函數（只針對中古屋資料）
filter_data <- function(data, age_min = NULL, age_max = NULL) {
  # 資料已經是中古屋（屋齡 >= 0），不需要再排除預售屋
  if (!is.null(age_min)) {
    data <- data %>% filter(age >= age_min)
  }
  if (!is.null(age_max)) {
    data <- data %>% filter(age <= age_max)
  }
  data
}

