# 建立七都每季筆數統計函數
calculate_quarterly_counts <- function(data, age_min = NULL, age_max = NULL) {
  # 篩選屋齡條件
  filtered_data <- data
  if (!is.null(age_min)) {
    filtered_data <- filtered_data %>% filter(age >= age_min)
  }
  if (!is.null(age_max)) {
    filtered_data <- filtered_data %>% filter(age <= age_max)
  }
  
  # 計算每季筆數
  quarterly_counts <- filtered_data %>%
    group_by(年度, 季度) %>%
    summarize(
      筆數 = n(),
      .groups = 'drop'
    ) %>%
    mutate(
      年度季度 = paste0(年度, "Q", 季度),
      篩選條件 = case_when(
        !is.null(age_min) & !is.null(age_max) ~ paste0("屋齡", age_min, "-", age_max, "年"),
        !is.null(age_max) ~ paste0("屋齡≤", age_max, "年"),
        !is.null(age_min) ~ paste0("屋齡≥", age_min, "年"),
        TRUE ~ "全部屋齡"
      )
    ) %>%
    select(年度, 季度, 年度季度, 篩選條件, 筆數)
  
  return(quarterly_counts)
}

# 建立七都各縣市每季筆數統計函數
calculate_city_quarterly_counts <- function(data, age_min = NULL, age_max = NULL) {
  # 篩選屋齡條件
  filtered_data <- data
  if (!is.null(age_min)) {
    filtered_data <- filtered_data %>% filter(age >= age_min)
  }
  if (!is.null(age_max)) {
    filtered_data <- filtered_data %>% filter(age <= age_max)
  }
  
  # 計算各縣市每季筆數
  city_quarterly_counts <- filtered_data %>%
    group_by(縣市, 年度, 季度) %>%
    summarize(
      筆數 = n(),
      .groups = 'drop'
    ) %>%
    mutate(
      年度季度 = paste0(年度, "Q", 季度),
      篩選條件 = case_when(
        !is.null(age_min) & !is.null(age_max) ~ paste0("屋齡", age_min, "-", age_max, "年"),
        !is.null(age_max) ~ paste0("屋齡≤", age_max, "年"),
        !is.null(age_min) ~ paste0("屋齡≥", age_min, "年"),
        TRUE ~ "全部屋齡"
      )
    ) %>%
    select(縣市, 年度, 季度, 年度季度, 篩選條件, 筆數)
  
  return(city_quarterly_counts)
}

