          filter(年度 == year, 季度 == quarter, 縣市 == city) %>%
          pull(中位數單價)
        
        # 如果數據不存在，設為 NULL
        if (length(value) == 0) {
          value <- NULL
        }
        
        # 填入對應的欄位
        if (city == "全國") {
          quarter_obj$Nation[[filter_name]] <- value
        } else if (city == "台北市") {
          quarter_obj$Taipei[[filter_name]] <- value
        } else if (city == "新北市") {
          quarter_obj$NewTaipei[[filter_name]] <- value
        } else if (city == "桃園市") {
          quarter_obj$Taoyuan[[filter_name]] <- value
        } else if (city == "台中市") {
          quarter_obj$Taichung[[filter_name]] <- value
        } else if (city == "台南市") {
          quarter_obj$Tainan[[filter_name]] <- value
        } else if (city == "高雄市") {
          quarter_obj$Kaohsiung[[filter_name]] <- value
        } else if (city == "新竹縣市") {
          quarter_obj$Hsinchu[[filter_name]] <- value
        }
      }
    }
    
    # 將季度物件加入結果列表
    result_data <- append(result_data, list(quarter_obj))
  }
}

