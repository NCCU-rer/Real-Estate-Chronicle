# 定義一個函數來統一格式
format_data <- function(data) {
  data <- data %>%
    mutate(
      # 將 1-15, 20-21, 24, 27-28, 34-36 欄轉為字串型別
      across(c(1:15, 20:21, 24, 27:28, 34:36), as.character),
      # 將 16-19, 22-23, 25-26, 29-33 欄轉為數字型別
      across(c(16:19, 22:23, 25:26, 29:33), as.numeric)
    )
  return(data)
}

